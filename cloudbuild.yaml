steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - -f
      - apps/api/Dockerfile
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/aegis-containers/talk-to-doc-api:latest
      - .

images:
  - us-central1-docker.pkg.dev/$PROJECT_ID/aegis-containers/talk-to-doc-api:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
